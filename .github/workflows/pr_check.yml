name: PR Validation Checks

on:
  pull_request:
    branches: [main]

jobs:
  validating-model-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Smoke Test Training
        run: |
          # We pass the flag here
          export PYTHONPATH=$PYTHONPATH:.
          python src/pipeline/training/training_pipeline.py --debug_mode